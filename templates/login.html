<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Secret For You 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">

</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="nebula n1"></div>
<div class="nebula n2"></div>
<div class="nebula n3"></div>
<div class="hearts" id="hearts"></div>

<div class="card">
  <span class="lock-icon">🔮</span>
  <h1>A Secret Awaits You</h1>
  <p class="subtitle">Something magical has been prepared just for you…</p>

  <form method="POST" action="/">
    <div class="input-wrap">
      <span class="input-icon">💫</span>
      <input type="password" name="password" placeholder="Enter your secret key…" autofocus autocomplete="off">
    </div>
    <button type="submit" class="btn">✨ Open the Magic ✨</button>
  </form>

  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}

  <p class="hint">Only the chosen one knows the key 🌙</p>
</div>

<script>
/* ── Star field ── */
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 220}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + .3,
    a: Math.random(),
    speed: Math.random() * .008 + .003,
    phase: Math.random() * Math.PI * 2
  }));
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = .3 + .7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,210,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(drawStars);

/* ── Floating hearts ── */
const heartsEl = document.getElementById('hearts');
const emojis = ['💖','💝','✨','🌸','💫','🌟'];
for (let i = 0; i < 14; i++) {
  const h = document.createElement('span');
  h.className = 'heart';
  h.textContent = emojis[i % emojis.length];
  h.style.left = Math.random() * 100 + '%';
  h.style.animationDuration = (Math.random() * 10 + 8) + 's';
  h.style.animationDelay = (Math.random() * 10) + 's';
  h.style.fontSize = (Math.random() * .8 + .8) + 'rem';
  heartsEl.appendChild(h);
}
</script>
</body>
</html>
