<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something Special… 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@400;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:   #ff6b9d;
    --peach:  #ffb347;
    --gold:   #ffd700;
    --lilac:  #c39bd3;
    --deep:   #1a0530;
    --text:   rgba(255,255,255,.92);
  }

  body {
    min-height: 100vh;
    background: var(--deep);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated gradient background */
  .bg-gradient {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg, #1a0530, #3d0d5c, #1a0530, #0d1a3d, #1a0530);
    background-size: 400% 400%;
    animation: gradShift 8s ease infinite;
  }
  @keyframes gradShift {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* Petals */
  .petal-field { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
  .petal {
    position:absolute; top:-40px;
    font-size:1.4rem;
    animation: petalFall linear infinite;
    opacity: 0;
  }
  @keyframes petalFall {
    0%  { transform:translateY(0) rotate(0deg) translateX(0); opacity:.8; }
    50% { transform:translateY(50vh) rotate(180deg) translateX(30px); opacity:.6; }
    100%{ transform:translateY(110vh) rotate(360deg) translateX(-20px); opacity:0; }
  }

  /* Main content */
  .content {
    position: relative; z-index: 10;
    text-align: center;
    padding: 40px 24px;
    max-width: 720px;
  }

  .sparkle-top {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 20px;
    animation: spin 6s linear infinite;
  }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  .surprise-label {
    font-family: 'Dancing Script', cursive;
    font-size: 1.1rem;
    color: var(--peach);
    letter-spacing: .3em;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeIn .8s .4s ease both;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.8rem, 7vw, 5rem);
    line-height: 1.2;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeIn .9s .7s ease both;
  }

  .line1 { color: #fff; }
  .line2 {
    background: linear-gradient(90deg, var(--rose), var(--gold), var(--peach), var(--rose));
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear 1.6s infinite, fadeIn .9s .7s ease both;
  }
  @keyframes shimmer {
    from{background-position:0% 50%} to{background-position:300% 50%}
  }

  .message {
    font-size: clamp(1.1rem, 2.5vw, 1.45rem);
    font-style: italic;
    color: rgba(255,255,255,.7);
    line-height: 1.9;
    max-width: 560px;
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeIn 1s 1.1s ease both;
  }

  /* Timer ring */
  .timer-wrap {
    display: flex; flex-direction:column; align-items:center; gap:12px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeIn .8s 1.5s ease both;
  }

  .ring-svg { transform: rotate(-90deg); }
  .ring-bg  { fill:none; stroke:rgba(255,255,255,.1); stroke-width:5; }
  .ring-fg  { fill:none; stroke:url(#ringGrad); stroke-width:5;
              stroke-linecap:round; stroke-dasharray:251.2; stroke-dashoffset:251.2;
              animation: countRing 10s linear 1.8s forwards; }
  @keyframes countRing { to { stroke-dashoffset: 0; } }

  .timer-num {
    position: absolute;
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    color: var(--gold);
    font-weight: 300;
  }
  .ring-container { position:relative; display:flex; align-items:center; justify-content:center; }

  .timer-hint {
    color: rgba(255,255,255,.4);
    font-size: .9rem;
    font-style: italic;
    letter-spacing: .05em;
  }

  /* Next button */
  .next-btn {
    display: inline-block;
    padding: 18px 48px;
    background: linear-gradient(135deg, #e91e8c, #ff6b35, #ffd700);
    background-size: 200% auto;
    border: none; border-radius: 60px;
    color: #fff;
    font-family: 'Dancing Script', cursive;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: .06em;
    transition: background-position .4s, box-shadow .3s, transform .2s;
    box-shadow: 0 0 30px rgba(233,30,140,.4), 0 0 60px rgba(255,107,53,.2);
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
  }
  .next-btn.active {
    animation: btnReveal .6s ease forwards;
    pointer-events: auto;
  }
  .next-btn:hover {
    background-position: right center;
    box-shadow: 0 0 50px rgba(233,30,140,.6), 0 0 90px rgba(255,107,53,.3);
    transform: translateY(-4px) scale(1.04);
  }
  @keyframes btnReveal {
    from { opacity:0; transform:translateY(20px) scale(.95); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  @keyframes fadeIn {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="petal-field" id="petalField"></div>

<div class="content">
  <span class="sparkle-top">🌸</span>
  <p class="surprise-label">✨ A Special Surprise ✨</p>

  <h1>
    <span class="line1">There is Something</span><br>
    <span class="line2">Very Special Waiting For You…</span>
  </h1>

  <p class="message">
    Close your eyes for just a moment.<br>
    Take a deep breath…<br>
    Because what comes next was made<br>
    <em>with all the love in the universe</em> — just for you. 🌙
  </p>

  <div class="timer-wrap">
    <div class="ring-container">
      <svg class="ring-svg" width="90" height="90" viewBox="0 0 90 90">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff6b9d"/>
            <stop offset="50%" stop-color="#ffd700"/>
            <stop offset="100%" stop-color="#ff6b35"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="45" cy="45" r="40"/>
        <circle class="ring-fg" cx="45" cy="45" r="40"/>
      </svg>
      <span class="timer-num" id="timerNum">10</span>
    </div>
    <span class="timer-hint">Preparing your magic…</span>
  </div>

  <a href="/cake" class="next-btn" id="nextBtn">
    💖 I'm Ready — Take Me There! 💖
  </a>
</div>

<script>
/* ── Petals ── */
const field = document.getElementById('petalField');
const petalEmojis = ['🌸','🌺','🌷','💮','🏵️','✿'];
for (let i = 0; i < 22; i++) {
  const p = document.createElement('span');
  p.className = 'petal';
  p.textContent = petalEmojis[i % petalEmojis.length];
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (Math.random() * 7 + 6) + 's';
  p.style.animationDelay   = (Math.random() * 10) + 's';
  p.style.fontSize = (Math.random() * .8 + .9) + 'rem';
  field.appendChild(p);
}

/* ── Countdown ── */
const numEl = document.getElementById('timerNum');
const btn   = document.getElementById('nextBtn');
let count = 10;

const tick = setInterval(() => {
  count--;
  numEl.textContent = count;
  if (count <= 0) {
    clearInterval(tick);
    numEl.textContent = '✨';
    btn.classList.add('active');
    // auto-click after a further 1 second if user doesn't
    setTimeout(() => { window.location.href = '/cake'; }, 1200);
  }
}, 1000);
</script>
</body>
</html>
