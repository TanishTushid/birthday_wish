<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make a Wish! 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='cake.css') }}">


</head>
<body>
<div class="bg"></div>
<canvas id="starCvs"></canvas>

<div class="top-label">
  <h1>🎂 Magical Cake Time! 🎂</h1>
  <p>Close your eyes… make a wish… then blow!</p>
</div>

<div class="cake-scene">
  <div class="candles">
    <div class="candle-wrap c1">
      <div class="flame" id="f1"></div>
      <div class="candle-body"></div>
    </div>
    <div class="candle-wrap c2">
      <div class="flame" id="f2"></div>
      <div class="candle-body"></div>
    </div>
    <div class="candle-wrap c3" style="transform:translateY(-6px)">
      <div class="flame" id="f3"></div>
      <div class="candle-body"></div>
    </div>
    <div class="candle-wrap c4">
      <div class="flame" id="f4"></div>
      <div class="candle-body"></div>
    </div>
    <div class="candle-wrap c5">
      <div class="flame" id="f5"></div>
      <div class="candle-body"></div>
    </div>
  </div>

  <div class="tier tier-top">
    <div class="drip"></div>
    <span style="font-size:1.4rem;z-index:2">🌸🌹🌸</span>
    <div class="sprinkle" style="background:#ff6b9d;top:20px;left:20px;transform:rotate(30deg)"></div>
    <div class="sprinkle" style="background:#ffd700;top:30px;left:50px;transform:rotate(-20deg)"></div>
    <div class="sprinkle" style="background:#7ec8e3;top:15px;right:20px;transform:rotate(45deg)"></div>
  </div>

  <div class="tier tier-mid">
    <div class="drip"></div>
    <span style="font-size:1.2rem;z-index:2;letter-spacing:8px">✨💫✨💫✨</span>
    <div class="sprinkle" style="background:#fff;top:25px;left:30px;transform:rotate(60deg)"></div>
    <div class="sprinkle" style="background:#ff6b35;top:40px;left:80px;transform:rotate(-10deg)"></div>
    <div class="sprinkle" style="background:#98fb98;top:20px;right:40px;transform:rotate(80deg)"></div>
    <div class="sprinkle" style="background:#ff6b9d;bottom:18px;right:70px;transform:rotate(20deg)"></div>
  </div>

  <div class="tier tier-bot">
    <div class="drip"></div>
    <span style="font-size:1.5rem;z-index:2;letter-spacing:6px">🎀💜🎀💜🎀</span>
    <div class="sprinkle" style="background:#ffd700;top:20px;left:20px;transform:rotate(30deg)"></div>
    <div class="sprinkle" style="background:#fff;top:40px;left:70px;transform:rotate(-30deg)"></div>
    <div class="sprinkle" style="background:#ff6b9d;bottom:15px;left:40px;transform:rotate(50deg)"></div>
    <div class="sprinkle" style="background:#7ec8e3;bottom:20px;right:50px;transform:rotate(-50deg)"></div>
    <div class="sprinkle" style="background:#ff6b35;top:30px;right:30px;transform:rotate(10deg)"></div>
  </div>

  <div class="plate"></div>
  <div class="cake-glow"></div>
</div>

<div class="blow-section">
  <p class="blow-title">🕯️ Make a Secret Wish 🕯️</p>
  <p class="blow-instruction">Hold your breath… think of your wish… then blow into the mic!</p>
  <div class="mic-bar"><div class="mic-fill" id="micFill"></div></div>
  <p class="mic-label" id="micLabel">🎤 Listening for your breath…</p>
  <br>
  <p class="wish-msg" id="wishMsg">Your wish has been sent to the stars! 🌟</p>
  <br>
  <button class="blow-btn" id="blowBtn" onclick="triggerBlow()">
    💨 Blow the Candles! 💨
  </button>
  <br>
  <a href="/fireworks" class="next-btn" id="nextBtn">
    🎉 Now Celebrate! 🎉
  </a>
</div>

<script>
/* ── Stars ── */
const cvs = document.getElementById('starCvs');
const ctx = cvs.getContext('2d');
let stars = [];
function resize() {
  cvs.width = window.innerWidth; cvs.height = window.innerHeight;
  stars = Array.from({length:180}, () => ({
    x: Math.random() * cvs.width,
    y: Math.random() * cvs.height,
    r: Math.random() * 1.2 + .3,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * .006 + .003
  }));
}
function drawStars(t) {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  stars.forEach(s => {
    const a = .2 + .7 * (0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase));
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,220,${a})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(drawStars);

/* ── Blow Logic ── */
const flames   = [1,2,3,4,5].map(i => document.getElementById('f' + i));
const wishEl   = document.getElementById('wishMsg');
const nextBtn  = document.getElementById('nextBtn');
const blowBtn  = document.getElementById('blowBtn');
const micFill  = document.getElementById('micFill');
const micLabel = document.getElementById('micLabel');

let blowing = false;   // has the blow sequence started?
let blown   = false;   // have candles already been extinguished?

/* Core: extinguish candles, then reveal next button after 2 s */
function triggerBlow() {
  if (blown) return;
  blown = true;

  // Disable manual button
  blowBtn.disabled = true;

  // Blow out all candles immediately
  flames.forEach(f => f.classList.add('blown'));

  // Show wish message
  setTimeout(() => {
    wishEl.classList.add('show');
  }, 400);

  // Show Next button after 2 seconds
  setTimeout(() => {
    nextBtn.classList.add('show');
  }, 2000);
}

/* ── Microphone Detection ── */
async function initMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = audioContext.createAnalyser();
    const microphone = audioContext.createMediaStreamSource(stream);

    analyser.fftSize = 256;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    microphone.connect(analyser);

    micLabel.textContent = '🎤 Listening for your breath…';

    // Rolling average to avoid one-frame spikes
    let smoothVolume = 0;

    function detect() {
      analyser.getByteFrequencyData(dataArray);
      const raw = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
      smoothVolume = smoothVolume * 0.8 + raw * 0.2;  // smooth

      // Update mic bar UI (0–100 mapped to 0–100%)
      const pct = Math.min(100, smoothVolume * 2);
      micFill.style.width = pct + '%';

      // Trigger blow if volume crosses threshold (30 is a solid blow)
      if (smoothVolume > 30 && !blown) {
        triggerBlow();
      }

      requestAnimationFrame(detect);
    }

    detect();
  } catch (err) {
    // Mic not available — just show the manual button prominently
    micLabel.textContent = '🎤 No mic? Use the button below!';
    console.warn('Mic access denied or unavailable:', err);
  }
}

initMic();
</script>
</body>
</html>
